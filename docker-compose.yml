services:

  web:
    image: vaishchavandocker/flask_notes_app_web:latest

    container_name: flask-app

    ports:
      - "5000:5000"

    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: notesdb

    depends_on:
      - db

  db:

    image: postgres:16

    container_name: postgres-db

    restart: always

    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: notesdb

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
