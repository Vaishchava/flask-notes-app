<!DOCTYPE html>
<html>

<head>
    <title>Notes App</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div class="container">

    <h1>Docker Notes App</h1>

    <form method="POST">

        <textarea
            name="content"
            placeholder="Write your note..."
            required>
        </textarea>

        <button type="submit">
            Save Note
        </button>

    </form>

    <div class="notes">

        {% for note in notes %}
        <div class="note-card">
            {{ note.content }}
        </div>
        {% endfor %}

    </div>

</div>

</body>
</html>
